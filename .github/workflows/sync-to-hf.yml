name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install huggingface_hub
        run: pip install -U "huggingface_hub[cli]"

      - name: Upload to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          hf upload sukiboo/image-rotate-mirror . . \
            --repo-type=space \
            --commit-message="Sync from GitHub ${{ github.sha }}" \
            --exclude ".git*" \
            --exclude ".github/*" \
            --exclude ".claude/*" \
            --exclude ".playwright-mcp/*" \
            --exclude ".mypy_cache/*" \
            --exclude "__pycache__/*" \
            --exclude "todo"
